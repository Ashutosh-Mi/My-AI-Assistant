<!DOCTYPE html>
<html>
<head>
    <title>Portfolio Chatbot</title>
    <style>
       body {
    font-family: Arial;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.chat-container {
    width: 450px;
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

#chat-box {
    height: 400px;
    overflow-y: auto;
    padding: 10px;
    background: #0b1220;
    border-radius: 10px;
    color: white;
}

.user {
    text-align: right;
    color: #60a5fa;
    margin: 5px;
}

.bot {
    text-align: left;
    color: #34d399;
    margin: 5px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

button {
    padding: 10px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Ashu's Chatbot</h2>

    <div id="chat-box"></div>

    <input type="text" id="user-input" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script src="/static/script.js"></script>

</body>
</html>
